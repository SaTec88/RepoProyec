name: Ejecutar Script de AWS Gratis

on:
  push:
    branches: [ main ] # Se ejecuta al subir cambios
  workflow_dispatch:   # Permite que tú le des a un botón para ejecutarlo manual

jobs:
  mi-automatizacion:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar mi código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Boto3
        run: pip install boto3

      - name: Configurar AWS (Usa los Secrets)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Pon la región donde tengas tus buckets

      - name: Correr el script
        run: python automatizacion.py